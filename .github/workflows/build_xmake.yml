        with:
          xmake-version: branch@master
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: macos-latest
          package-cache: true
          package-cache-key: macos-latest
          build-cache: true
          build-cache-key: macos-latest

      - name: Create venv and install tooling
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip3 install --upgrade pip
          pip3 install pybind11-stubgen numpy trimesh

      - name: Fetch ext dependencies
        shell: bash
        run: |
          set -e
          clone_ext() {
            local repo="$1" ref="$2" dir="ext/$3"
            if [ -d "$dir/.git" ]; then
              echo "Skipping $dir (already present)"
