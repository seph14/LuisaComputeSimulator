          clone_ext https://github.com/Ligo04/lc_parallel_primitive.git 346650626098ba236297df152d2974f2c0618f44 lcpp
          if [ ! -d ext/eigen/.git ] && [ ! -f ext/eigen/Eigen/Dense ]; then
            rm -rf ext/eigen
            git clone --depth 1 --branch 3.4.0 https://gitlab.com/libeigen/eigen.git ext/eigen
          fi
          if [ ! -d ext/pybind11/.git ]; then
